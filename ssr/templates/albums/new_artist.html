<!DOCTYPE html>
<html lang="en">

<head>
	<meta charset="utf-8">
</head>

<body>

	<h2>{{err_msg}}</h2>
	<!-- err_msg -->
	<form action="/artists/new" method="post">
		{% if errors %}
        <p class="t-errors">
          There were errors with your submission: {{ errors }}
        </p>
		{% endif %}

		<label for="artist_name">Aritst name </label>
		<input type="text" name="artist_name" , id="artist_name">



		<label for="genre">Aritst Genre</label>
		<input type="text" name="genre" , id="genre">


		<input type="submit" value="Create Artist">
	</form>


</body>

</html>
